name: konnect
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  webview_flutter: ^4.4.2
  image_picker: ^1.0.7
  url_launcher: ^6.1.10
  intl: ^0.19.0
  mime: ^2.0.0
  path: ^1.9.1
  app_links: ^6.3.2
  
  # State Management
  provider: ^6.1.1
  
  # Payment Gateway
  razorpay_flutter: ^1.3.7
  
  # Local Storage (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/images/ai/
    - assets/images/social/
    - assets/images/mock/
